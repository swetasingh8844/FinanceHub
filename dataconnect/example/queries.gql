query ListAllUsers @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  users {
    id
    username
    email
    firstName
    lastName
    createdAt
    lastLogin
    role {
      name
    }
  }
}

mutation CreateNewFinancialTransaction($amount: Float!, $type: String!, $description: String!, $transactionDate: Date!, $category: String, $referenceNumber: String, $notes: String) @auth(level: USER) {
  financialTransaction_insert(data: {
    amount: $amount,
    type: $type,
    description: $description,
    transactionDate: $transactionDate,
    category: $category,
    referenceNumber: $referenceNumber,
    notes: $notes,
    createdAt_expr: "request.time",
    createdById_expr: "auth.uid"
  })
}

query GetUserPermissions($userId: UUID!) @auth(level: USER) {
  user(id: $userId) {
    id
    username
    role {
      name
      permissions_via_RolePermission {
        id
        name
        description
      }
    }
  }
}

mutation UpdateUserLastLogin @auth(level: USER) {
  user_update(
    key: {id_expr: "auth.uid"},
    data: {
      lastLogin_expr: "request.time"
    }
  )
}